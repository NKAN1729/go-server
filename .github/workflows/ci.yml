name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Test · Lint · Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # shared-types and go-game must be built before anything else
      # because other packages resolve them via ./dist, which is gitignored
      - name: Build shared-types
        run: pnpm --filter @go-server/shared-types build

      - name: Build go-game
        run: pnpm --filter @go-server/go-game build

      - name: Typecheck (all workspaces)
        run: pnpm typecheck

      - name: Lint (all workspaces)
        run: pnpm lint

      - name: Test (all workspaces)
        run: pnpm test
